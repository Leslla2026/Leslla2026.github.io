<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      {% if page.title %}{{ page.title | escape }} · {% endif %}
      {{ site.title | default: "Site" | escape }}
    </title>

    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">

    {% if page.excerpt %}
      <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}">
    {% elsif site.description %}
      <meta name="description" content="{{ site.description | escape }}">
    {% endif %}
  </head>

  <body>
    {% include nav.html %}

    <main id="main-content" class="page-content" style="max-width: 960px; margin: 0 auto; padding: 0 16px;">
      {{ content }}
    </main>

    <footer class="site-footer" style="max-width: 960px; margin: 2rem auto; padding: 0 16px;">
      <p style="font-size:.9rem;opacity:.7;margin:0;">
        © {{ site.title | default: "Site" }} — {{ site.description }}
      </p>
    </footer>
  </body>
</html>
